name: Release installers

# Every tagged release gets CI-built Windows installers. Idempotent by
# design: assets that already exist on the release (e.g. hand-uploaded from
# a local build) are left alone, so this can coexist with local releasing.
on:
  push:
    tags: ["v*"]

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # The ProRes sidecar (~110 MB, gitignored) — tauri build fails without it
      - run: node scripts/fetch-ffmpeg.mjs

      # The SAME gate set as ci.yml. Running a smaller one here is how two
      # releases shipped off a main that was failing `format:check` — a red
      # main was invisible at release time because the release path enforced a
      # different contract. If a gate is worth blocking a PR, it is worth
      # blocking a release.
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: cargo test --lib
        working-directory: src-tauri

      # The signing key produces the .sig updater artifacts the in-app
      # auto-updater verifies against the pubkey pinned in tauri.conf.json.
      - run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Stage assets with clean names
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist-release
          cp "src-tauri/target/release/bundle/nsis/Beatform_${VERSION}_x64-setup.exe" \
             "dist-release/Beatform_${VERSION}_x64-setup.exe"
          cp "src-tauri/target/release/bundle/msi/Beatform_${VERSION}_x64_en-US.msi" \
             "dist-release/Beatform_${VERSION}_x64_en-US.msi"
          (cd dist-release && sha256sum *.exe *.msi > SHA256SUMS.txt && cat SHA256SUMS.txt)

      # latest.json is what installed apps poll (releases/latest/download/
      # latest.json). NSIS-only by policy: Tauri's silent in-place update is
      # built around the NSIS installer; the MSI stays a manual/enterprise
      # option outside auto-update.
      - name: Build the updater manifest (latest.json)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          SIG_FILE="src-tauri/target/release/bundle/nsis/Beatform_${VERSION}_x64-setup.exe.sig"
          if [ ! -f "$SIG_FILE" ]; then
            echo "::error::updater signature missing — TAURI_SIGNING_PRIVATE_KEY secret not set?"
            exit 1
          fi
          export V="$VERSION"
          export SIG="$(cat "$SIG_FILE")"
          export URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/Beatform_${VERSION}_x64-setup.exe"
          export PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          node -e "
            const fs = require('fs');
            fs.writeFileSync('dist-release/latest.json', JSON.stringify({
              version: process.env.V,
              notes: 'See the release notes: https://github.com/' + process.env.GITHUB_REPOSITORY + '/releases/tag/v' + process.env.V,
              pub_date: process.env.PUB_DATE,
              platforms: { 'windows-x86_64': { signature: process.env.SIG, url: process.env.URL } },
            }, null, 2));
          "
          cat dist-release/latest.json

      - name: Attach to the GitHub release (create draft if missing, skip existing assets)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          if ! gh release view "$TAG" --json name >/dev/null 2>&1; then
            gh release create "$TAG" --draft --generate-notes --title "$TAG"
          fi
          EXISTING=$(gh release view "$TAG" --json assets --jq '.assets[].name')
          for f in dist-release/*; do
            name=$(basename "$f")
            if grep -qxF "$name" <<<"$EXISTING"; then
              echo "skip (exists): $name"
            else
              gh release upload "$TAG" "$f"
              echo "uploaded: $name"
            fi
          done
