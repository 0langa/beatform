<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- The app is dark-only (see App.css's :root color-scheme) — the meta
         tag backs that up so native chrome (scrollbars, form controls) skips
         a light-mode flash before the stylesheet loads. -->
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="Beatform — a local-first music visualizer with realtime preview and deterministic offline export from the same engine."
    />
    <title>Beatform</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
